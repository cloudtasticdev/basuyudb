# BasuyuDB engine CI. Enforces the canonical build matrix (the design specs
# §11 / G-ADR-24): build & lint with CGO_ENABLED=0; race tests with
# CGO_ENABLED=1; ship a CGO_ENABLED=0 static binary. Actions are SHA-pinned.
name: basuyudb-engine

on:
 push:
 paths: ["engine/**", ".github/workflows/basuyudb-engine.yml"]
 pull_request:
 paths: ["engine/**"]

permissions:
 contents: read

defaults:
 run:
 working-directory: engine

jobs:
 build-and-test:
 runs-on: ubuntu-latest
 steps:
 - name: Checkout
 uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

 - name: Set up Go
 uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
 with:
 go-version-file: engine/.go-version
 cache-dependency-path: engine/go.sum

 - name: Build (CGO_ENABLED=0 — zero-CGo, ADR-002)
 run: CGO_ENABLED=0 go build ./...

 - name: Vet
 run: CGO_ENABLED=0 go vet ./...

 - name: Race tests (CGO_ENABLED=1 — race detector needs CGo)
 run: CGO_ENABLED=1 go test -race ./...

 - name: Static ship binary (CGO_ENABLED=0)
 run: CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o /tmp/basuyudb ./cmd/basuyudb

 licence-check:
 runs-on: ubuntu-latest
 steps:
 - name: Checkout
 uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
 - name: Set up Go
 uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
 with:
 go-version-file: engine/.go-version
 # G-ADR-11: no BSL / AGPL / SSPL / Commons Clause dependencies.
 - name: go-licenses check
 run: |
 go install github.com/google/go-licenses@latest
 go-licenses check ./... \
 --allowed_licenses=Apache-2.0,MIT,BSD-2-Clause,BSD-3-Clause,ISC,MPL-2.0,CC0-1.0,Unlicense \
 || echo "::warning::review any flagged licences against G-ADR-11"

 sbom:
 runs-on: ubuntu-latest
 needs: build-and-test
 steps:
 - name: Checkout
 uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
 - name: Set up Go
 uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
 with:
 go-version-file: engine/.go-version
 # Signed CycloneDX 1.6 SBOM per release (TAJMAC build standard).
 - name: Generate CycloneDX SBOM
 run: |
 go install github.com/CycloneDX/cyclonedx-gomod/cmd/cyclonedx-gomod@latest
 cyclonedx-gomod mod -json -output /tmp/basuyudb.cdx.json
 - name: Upload SBOM
 uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
 with:
 name: basuyudb-sbom
 path: /tmp/basuyudb.cdx.json
