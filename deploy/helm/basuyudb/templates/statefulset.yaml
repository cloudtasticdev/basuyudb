apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "basuyudb.fullname" . }}
  labels:
    {{- include "basuyudb.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "basuyudb.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "basuyudb.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "basuyudb.selectorLabels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- if eq .Values.antiAffinity "required" }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  {{- include "basuyudb.selectorLabels" . | nindent 18 }}
              topologyKey: kubernetes.io/hostname
      {{- end }}
      initContainers:
        # Clear stale BadgerDB + dragonboat lock/temp files left by an ungraceful
        # exit (OOMKill / SIGKILL), preventing CrashLoopBackOff on restart.
        # MUST NOT reference MANIFEST-LOCK (does not exist in BadgerDB) — D10.
        - name: clear-locks
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              rm -f /data/badger/LOCK
              rm -f /data/raft/tan/LOCK
              rm -f /data/raft/WAL/*.tmp
              true
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: basuyudb
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - { name: pg-wire,   containerPort: {{ .Values.ports.pgWire }} }
            - { name: otlp-grpc, containerPort: {{ .Values.ports.otlpGrpc }} }
            - { name: otlp-http, containerPort: {{ .Values.ports.otlpHttp }} }
            - { name: raft,      containerPort: {{ .Values.ports.raft }} }
            - { name: gossip,    containerPort: {{ .Values.ports.gossip }} }
            - { name: mgmt,      containerPort: {{ .Values.ports.management }} }
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: BASUYUDB_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: BASUYUDB_DATA_DIR
              value: /data/badger
            - name: BASUYUDB_RAFT_DIR
              value: /data/raft
            - name: BASUYUDB_PG_ADDR
              value: ":{{ .Values.ports.pgWire }}"
            - name: BASUYUDB_OTLP_GRPC_ADDR
              value: ":{{ .Values.ports.otlpGrpc }}"
            - name: BASUYUDB_MANAGEMENT_PORT
              value: "{{ .Values.ports.management }}"
            {{- /* Cluster formation: enabled only for multi-replica deployments.
                   A single-replica pilot runs the LocalCommitter (no Raft). */}}
            {{- if gt (int .Values.replicaCount) 1 }}
            - name: BASUYUDB_CLUSTER_ENABLED
              value: "true"
            {{- /* This pod's Raft transport address via stable headless-service
                   pod DNS: <pod>.<headless>.<ns>.svc.cluster.local:<raftPort>. */}}
            - name: BASUYUDB_RAFT_ADDR
              value: "$(POD_NAME).{{ include "basuyudb.fullname" . }}-headless.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.ports.raft }}"
            {{- /* Founding membership: pod ordinal i -> replica id i+1 (matches
                   the binary's parseReplicaID: ordinal+1). Built as
                   "id@host:port,..." across all replicas. */}}
            - name: BASUYUDB_RAFT_PEERS
              value: "{{- $top := . -}}
                {{- $svc := include "basuyudb.fullname" . -}}
                {{- $ns := .Release.Namespace -}}
                {{- $port := .Values.ports.raft -}}
                {{- $n := int .Values.replicaCount -}}
                {{- range $i := until $n -}}
                  {{- if $i }},{{ end -}}
                  {{ add $i 1 }}@{{ $svc }}-{{ $i }}.{{ $svc }}-headless.{{ $ns }}.svc.cluster.local:{{ $port }}
                {{- end -}}"
            {{- else }}
            - name: BASUYUDB_CLUSTER_ENABLED
              value: "false"
            {{- end }}
            {{- if .Values.managementToken }}
            - name: BASUYUDB_MANAGEMENT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "basuyudb.fullname" . }}-mgmt-token
                  key: token
            {{- end }}
            # Canonical key is BASUYUDB_DEV_MODE (never DEV_MODE).
            - name: BASUYUDB_DEV_MODE
              value: {{ .Values.devMode | quote }}
            - name: BASUYUDB_LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
            - name: BASUYUDB_RAFT_ELECTION_TIMEOUT_MS
              value: "{{ mul .Values.raft.electionRTT .Values.raft.rttMillisecond }}"
            {{- if .Values.encryptionKey }}
            - name: BASUYUDB_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "basuyudb.fullname" . }}-encryption
                  key: key
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if gt (int .Values.replicaCount) 1 }}
          {{- /* Clustered: probe the management HTTP server. Liveness uses
                 /health (process is up). Readiness uses /health too so a
                 follower stays in the Service endpoints for read routing;
                 write traffic is steered to the primary by probing /leader
                 (HAProxy/PgCat), not by gating pod readiness. */}}
          readinessProbe:
            httpGet:
              path: /health
              port: mgmt
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: mgmt
            initialDelaySeconds: 15
            periodSeconds: 20
          {{- else }}
          {{- /* Single-node pilot: no management server; probe the PG wire port. */}}
          readinessProbe:
            tcpSocket:
              port: pg-wire
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: pg-wire
            initialDelaySeconds: 15
            periodSeconds: 20
          {{- end }}
          lifecycle:
            preStop:
              exec:
                # Sleep only (no SIGTERM here) — D10. The engine's own signal
                # handler flushes BadgerDB on the real SIGTERM from kubelet.
                command: ["/bin/sleep", "5"]
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ .Values.storage.storageClassName }}
        resources:
          requests:
            storage: {{ .Values.storage.size }}
